front:
  text: 洪恩靈濟眞君集福宿啓儀壹三
  hash: sha256:245b16f4dcf5cea99d7e91f5343ca6ecda955f54cdf6653bd0a2b5b4ce82f758
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0153_HFL_000-001a, image: hfl/0264/0264-062.png}
body:
  text: 法事如式各禮師存念如法請宣神呪東方東方九炁始皇青天碧霞鬱壘中有老人總校圖録攝炁舉仙南方南方丹天赤帝玉堂中有大神號曰赤皇上炎流煙三炁勃光神仙受命應㑹太陽西方西方素天白帝七門金靈皓暎太華流氛白石峨峨七炁氤氲上有始生皇老大神總領肺氣主校九天檢定圖録制召上仙北方北方玄天五炁徘徊中有黒帝𩀱皇太微總領符命仙錬八威青裙羽䙱龍文鳳衣上帝所舉制到玉階中央中央總靈黄上天元始生五老中皇髙尊攝炁監眞總領羣仙典録女圖宿簡玉文催運上炁普告萬神鳴法鼓二十四通太上玄元五靈老君召出臣等身中三五功曹左右香官使者侍香金童傳言玉女直日香官功曹使者三炁正神速上關啓查邊魏趙刀五大元帥岳許二元帥天丁力士左右神官以今肅啓告齋建壇闡事臣等欽奉聖㫖其諸意㫖巳録上聞願得正眞生炁下降流入臣等身中令今所啓之言速逹九天金闕洪恩眞君九天玉闕洪恩眞君聖前請稱法位具位臣某等今故燒香願以是功徳洪惟九天金闕洪恩眞君九天玉闕洪恩眞君華蕚聮輝簮纓冠世潜天潜地獨專造化之功曰雨曰晹莫測威靈之妙洋洋如在濯濯厥靈願洞賜於鑒觀特俯歆於崇謝臣等先用上祝皇圖䡗固聖夀綿長廓施化育之仁垂拱大平之治次爲儲宫藩屏宰輔公卿官屬下及臣等三師五友異代學眞谷隠巖栖門徒祭酒以至寰中庶類天下人民動植飛潜無邊含識臣等皈身皈神皈命九天金闕玉闕洪恩眞君特乞消除三業六根無邊釁咎得免離三災五苦八難九厄之中身得眞道歌詠太平同躋仁夀逍遥無爲永與道合所祈玄感應聲上詣九天金闕洪恩眞君九天玉闕洪恩眞君聖前唱方禮足各長跪皈命懴悔臣法衆等志心皈身皈神皈命九天金闕洪恩眞君九天玉闕洪恩眞君恭望大慈同垂巨澤普降洪恩臣聞玉字開光鳳篆昭回於碧落金科演妙龍章輝煥於赤明修之則駕景騰霄用之則安人利物重念臣等五神蕩越六府昏迷身口意之業塵流吹罔息精炁神之妙用混結未凝亶祈澡雪於襟靈庶使澄清於諸障消融五累證妙三元端一念於黄中對揚有翼望九霄於玄上應感無方臣等志心稽首禮謝九天金闕洪恩眞君九天玉闕洪恩眞君聖前三啓頌三禮謝重稱法位具位臣某與臨壇法衆代禮官等謹同誠上啓九天金闕洪恩眞君九天玉闕洪恩眞君聖父翊亮眞君聖母仁壽淑善仙妃聖妃涇國夫人順助仁惠貞應仙妃衞國夫人善助慈懿恭靜仙妃聖兄聖嫂聖舅聖婿聖子聖女聖姪聖孫列位仙眷合殿威靈查邊魏趙刁五大元帥岳許二元帥今年太歳之神京都城隍本宫土地之神靈壇感降一切祇靈咸望洪慈俯垂洞鍳臣等草芥微生醯雞陋質幸依昌運獲奉玄宗主典祠宫功無及於分寸周流塵俗過有積於丘山尚祈善貸之仁克副禱祈之請凡有關告敢不上聞臣欽奉聖㫖崇修清醮延奉眞斿潔己齋心推誠秉愫恭依瓊範崇建瑶壇列羽葆之繽紛扣琳琅而振響金華散彩玉燭騰輝謝過殫誠祈恩請命仰惟九天金闕玉闕洪恩眞君降差官屬五帥神員恊力同心肅清内外蕩除兇穢逺隔妖氛使臣等五氣安熈百關調泰操存達詣合神景於丹元啓告感通注靈光於紫禁善功克備齋福周圓一切含靈同沾勝善明晨行道别具啓聞發願存神燒香謹攝香官使者左右神君侍香諸靈官當令宿建之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前當願精誠上達家國安寜十方仙童玉女接侍香煙傳臣向來所啓之言速達九天金闕洪恩眞君九天玉闕洪恩眞君聖前洪恩靈濟眞君集福宿啓儀
